name: Publish PR Preview Charts

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "charts/**"
      - ".github/actions/publish-pr-preview-charts/**"
      - ".github/scripts/publish_pr_preview_charts.py"
      - ".github/workflows/publish-pr-preview-charts.yaml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to publish preview charts for"
        required: true
        type: string

concurrency:
  group: pr-chart-preview-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: read

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_author_login: ${{ steps.resolve.outputs.pr_author_login }}
      head_repo_owner: ${{ steps.resolve.outputs.head_repo_owner }}
      head_repo_full_name: ${{ steps.resolve.outputs.head_repo_full_name }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      publish_allowed: ${{ steps.resolve.outputs.publish_allowed }}
    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let pr;

            if (context.eventName === "pull_request") {
              pr = context.payload.pull_request;
            } else {
              const prNumberRaw = context.payload.inputs?.pr_number;
              const prNumber = Number(prNumberRaw);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed(`Invalid pr_number input: ${prNumberRaw}`);
                return;
              }

              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              pr = response.data;
            }

            if (!pr) {
              core.setFailed("Unable to resolve PR context");
              return;
            }

            const prNumber = String(pr.number);
            const prAuthorLogin = pr.user?.login || "";
            const headRepoOwner = pr.head?.repo?.owner?.login || "";
            const headRepoFullName = pr.head?.repo?.full_name || "";
            const baseSha = pr.base?.sha || "";
            const headSha = pr.head?.sha || "";
            const publishAllowed =
              headRepoOwner === "cyclikal94" &&
              headRepoFullName === `${context.repo.owner}/${context.repo.repo}`;

            if (!baseSha || !headSha) {
              core.setFailed("Resolved PR is missing base/head SHA information");
              return;
            }

            core.setOutput("pr_number", prNumber);
            core.setOutput("pr_author_login", prAuthorLogin);
            core.setOutput("head_repo_owner", headRepoOwner);
            core.setOutput("head_repo_full_name", headRepoFullName);
            core.setOutput("base_sha", baseSha);
            core.setOutput("head_sha", headSha);
            core.setOutput("publish_allowed", publishAllowed ? "true" : "false");

  publish-preview-self:
    needs: resolve-context
    if: >-
      needs.resolve-context.outputs.publish_allowed == 'true' &&
      needs.resolve-context.outputs.pr_author_login == 'cyclikal94'
    runs-on: ubuntu-latest
    outputs:
      has_charts: ${{ steps.publish.outputs.has_charts }}
      comment_payload: ${{ steps.publish.outputs.comment_payload }}
    steps:
      - name: Checkout workflow ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-context.outputs.head_sha }}
          path: pr-source

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Publish previews
        id: publish
        uses: ./.github/actions/publish-pr-preview-charts
        with:
          source-root: pr-source
          base-sha: ${{ needs.resolve-context.outputs.base_sha }}
          head-sha: ${{ needs.resolve-context.outputs.head_sha }}
          pr-number: ${{ needs.resolve-context.outputs.pr_number }}
          preview-registry: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

  publish-preview-approved:
    needs: resolve-context
    if: >-
      needs.resolve-context.outputs.publish_allowed == 'true' &&
      needs.resolve-context.outputs.pr_author_login != 'cyclikal94'
    runs-on: ubuntu-latest
    outputs:
      has_charts: ${{ steps.publish.outputs.has_charts }}
      comment_payload: ${{ steps.publish.outputs.comment_payload }}
    environment:
      name: pr-preview-publish
    steps:
      - name: Checkout workflow ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-context.outputs.head_sha }}
          path: pr-source

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Publish previews
        id: publish
        uses: ./.github/actions/publish-pr-preview-charts
        with:
          source-root: pr-source
          base-sha: ${{ needs.resolve-context.outputs.base_sha }}
          head-sha: ${{ needs.resolve-context.outputs.head_sha }}
          pr-number: ${{ needs.resolve-context.outputs.pr_number }}
          preview-registry: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

  pr-preview-comment:
    needs:
      - resolve-context
      - publish-preview-self
      - publish-preview-approved
    if: >-
      always() &&
      needs.resolve-context.outputs.publish_allowed == 'true' &&
      (needs.publish-preview-self.result == 'success' || needs.publish-preview-approved.result == 'success') &&
      (needs.publish-preview-self.outputs.has_charts == 'true' || needs.publish-preview-approved.outputs.has_charts == 'true')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Upsert PR preview comment
        uses: actions/github-script@v7
        env:
          COMMENT_PAYLOAD: ${{ needs.publish-preview-self.outputs.comment_payload || needs.publish-preview-approved.outputs.comment_payload }}
        with:
          script: |
            const marker = "<!-- pr-preview-comment -->";
            const metadataRegex = /<!-- pr-preview-comment-metadata:([A-Za-z0-9+/=]+) -->/;

            const payload = JSON.parse(process.env.COMMENT_PAYLOAD);
            const prNumber = Number(payload.prNumber);
            const registry = payload.registry;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            let state = {
              registry,
              prNumber: payload.prNumber,
              charts: {},
            };

            if (existingComment) {
              const match = existingComment.body.match(metadataRegex);
              if (match) {
                try {
                  state = JSON.parse(Buffer.from(match[1], "base64").toString("utf8"));
                } catch (error) {
                  core.warning(`Failed to parse existing preview metadata: ${error.message}`);
                }
              }
            }

            state.registry = registry;
            state.prNumber = payload.prNumber;

            for (const chartInfo of payload.charts) {
              const existing = state.charts[chartInfo.chart] || {
                chart: chartInfo.chart,
                previewChart: chartInfo.previewChart,
                rollingVersion: chartInfo.rollingVersion,
                immutableVersions: [],
              };

              existing.previewChart = chartInfo.previewChart;
              existing.rollingVersion = chartInfo.rollingVersion;
              existing.immutableVersions = existing.immutableVersions || [];
              existing.immutableVersions = [
                chartInfo.immutableVersion,
                ...existing.immutableVersions.filter((value) => value !== chartInfo.immutableVersion),
              ];

              state.charts[chartInfo.chart] = existing;
            }

            const sortedCharts = Object.values(state.charts).sort((a, b) => a.chart.localeCompare(b.chart));
            const metadata = Buffer.from(JSON.stringify(state)).toString("base64");

            const lines = [
              marker,
              `<!-- pr-preview-comment-metadata:${metadata} -->`,
              "Preview charts for this PR have been built and are ready to test.",
              "",
              "Use the install template below, then substitute the chart and version you want to test from the table.",
              "",
              "```bash",
              'export BASE_CHART="mautrix-whatsapp"',
              'export CHART="${BASE_CHART}-pr"',
              'export VERSION="1.0.1-pr.' + payload.prNumber + '"',
              "",
              'helm upgrade --install "${CHART}" "oci://' + registry + '/${CHART}" \\',
              '  --version "${VERSION}" \\',
              '  --namespace "${CHART}" \\',
              '  --create-namespace \\',
              '  --values "./${BASE_CHART}-values.yaml"',
              "```",
              "",
              "| Base chart | Preview chart | Rolling version | Immutable commit versions |",
              "| --- | --- | --- | --- |",
            ];

            for (const chart of sortedCharts) {
              const immutableVersions = chart.immutableVersions
                .map((version) => `\`${version}\``)
                .join("<br>");
              lines.push(
                `| \`${chart.chart}\` | \`${chart.previewChart}\` | \`${chart.rollingVersion}\` | ${immutableVersions} |`
              );
            }

            const body = lines.join("\n").trim();

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
